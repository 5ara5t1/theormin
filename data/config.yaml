  real_analysis: 500
  linear_algebra: 300
  ode: 400
  complex_analysis: 200
  calc_of_variations: 100
  pde: 200
  math_methods: 100
  functional_analysis: 200
  group_theory: 100
  asymptotics: 100
  probability: 100
  numerical_methods: 100
  general_physics: 2000
  mechanics: 400
  classical_fields: 300
  quantum_mechanics: 1000
  qed: 300
  stat_phys: 400
  fluid_mechanics: 200
  elasticity: 150
  continuous_em: 200
  kinetics: 150
  qft: 600
  gr: 400
  eft: 200
